sonar.organization=efeluleflotron
sonar.projectKey=efeluleflotron_email-assistant

sonar.sources=src
sonar.tests=src/__tests__
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

sonar.exclusions=**/node_modules/**,**/.next/**,**/coverage/**,src/db/migrations/**,**/*.config.{js,ts,mjs}
sonar.coverage.exclusions=src/__tests__/**,**/*.test.{ts,tsx},src/db/migrations/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json
